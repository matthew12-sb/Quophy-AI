<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quophy AI — Your Personal AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Tiempos+Text:ital,wght@0,400;0,500;1,400&family=Söhne:wght@300;400;500;600&display=swap');

/* Fallback using available Google Fonts that approximate Claude's feel */
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f5f4ef;
  --surface:  #ffffff;
  --surface2: #f0efe9;
  --border:   #e5e3db;
  --border2:  #d4d2c9;
  --accent:   #d97757;
  --accent2:  #c96442;
  --accent3:  #e8956d;
  --text:     #1a1915;
  --text2:    #3d3c38;
  --muted:    #9b9888;
  --user-bg:  #ffffff;
  --danger:   #d4433a;
  --success:  #2d7d52;
  --shadow:   rgba(0,0,0,0.06);
  --shadow2:  rgba(0,0,0,0.12);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Subtle warm paper texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(217,119,87,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(201,100,66,0.04) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
}
body::after { display: none; }

.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100dvh;
  max-width: 780px;
  margin: 0 auto;
}

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(245,244,239,0.92);
  backdrop-filter: blur(20px);
  flex-shrink: 0; gap: 12px;
}

.logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 2px 8px rgba(217,119,87,0.3);
}
/* Replace the emoji with the Claude asterisk/spark feel via CSS */
.logo-icon::before {
  content: '✦';
  color: #fff;
  font-size: 14px;
}
.logo-icon { font-size: 0; } /* hide original emoji */

.logo-text {
  font-family: 'Lora', Georgia, serif;
  font-weight: 500;
  font-size: 1.15rem;
  letter-spacing: -0.01em;
  color: var(--text);
  background: none;
  -webkit-text-fill-color: var(--text);
}
.logo-sub {
  font-size: 0.58rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 500;
}

.header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

.modes { display: flex; gap: 3px; background: var(--surface2); border-radius: 10px; padding: 3px; border: 1px solid var(--border); }
.mode-btn {
  padding: 5px 12px; border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.68rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  text-transform: none;
  letter-spacing: 0;
}
.mode-btn:hover { color: var(--text2); }
.mode-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 4px var(--shadow2);
  font-weight: 500;
}

/* header icon buttons */
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.18s;
  position: relative;
  box-shadow: 0 1px 3px var(--shadow);
}
.icon-btn:hover { border-color: var(--border2); color: var(--text2); box-shadow: 0 2px 6px var(--shadow2); }
.icon-btn.on { border-color: var(--success); color: var(--success); background: rgba(45,125,82,0.06); }
.icon-btn .tooltip {
  position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--surface);
  font-size: 0.6rem; font-family: 'DM Sans', sans-serif;
  padding: 4px 8px; border-radius: 5px;
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: opacity 0.15s; z-index: 10;
}
.icon-btn:hover .tooltip { opacity: 1; }

/* ── MESSAGES ── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 28px 24px;
  display: flex; flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.messages::-webkit-scrollbar-track { background: transparent; }

/* welcome */
.welcome {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex: 1; gap: 20px;
  padding: 40px 20px;
  text-align: center;
  animation: fadeIn 0.5s ease;
}
.welcome-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 0;
  box-shadow: 0 4px 20px rgba(217,119,87,0.25);
  animation: gentle-float 4s ease-in-out infinite;
}
.welcome-icon::before {
  content: '✦';
  color: #fff;
  font-size: 28px;
}
@keyframes gentle-float {
  0%,100% { transform: translateY(0); box-shadow: 0 4px 20px rgba(217,119,87,0.25); }
  50% { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(217,119,87,0.35); }
}
@keyframes pulse-glow { 0%,100% {} 50% {} } /* override original */

.welcome h1 {
  font-family: 'Lora', Georgia, serif;
  font-weight: 500;
  font-size: 2rem;
  color: var(--text);
  background: none;
  -webkit-text-fill-color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.welcome p { color: var(--muted); font-size: 0.88rem; max-width: 360px; line-height: 1.65; font-weight: 400; }

.suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
.suggestion {
  padding: 8px 16px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.76rem;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: 0 1px 3px var(--shadow);
}
.suggestion:hover {
  border-color: var(--accent3);
  color: var(--accent2);
  background: rgba(217,119,87,0.04);
  transform: translateY(-1px);
  box-shadow: 0 3px 8px var(--shadow);
}

/* messages */
.msg { display: flex; gap: 12px; animation: slideUp 0.25s ease; max-width: 100%; }
@keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0; margin-top: 3px;
}
.msg.user .msg-avatar {
  background: linear-gradient(135deg, #e8e6df, #d4d1c8);
  border: 1px solid var(--border);
  color: var(--muted);
}
.msg.bot .msg-avatar {
  background: var(--accent);
  box-shadow: 0 2px 8px rgba(217,119,87,0.25);
  font-size: 0;
}
.msg.bot .msg-avatar::before {
  content: '✦';
  color: #fff;
  font-size: 11px;
}

.msg-content { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
.msg.user .msg-content { align-items: flex-end; }

.bubble {
  padding: 12px 16px; border-radius: 16px;
  font-size: 0.875rem; line-height: 1.7;
  word-break: break-word;
  font-family: 'DM Sans', sans-serif;
}
.msg.user .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-right-radius: 5px;
  box-shadow: 0 1px 4px var(--shadow);
  color: var(--text);
}
.msg.bot .bubble {
  background: transparent;
  border: none;
  padding-left: 0;
  color: var(--text);
}

.bubble pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-top: 10px;
  overflow-x: auto;
  font-size: 0.8rem;
  line-height: 1.55;
  box-shadow: 0 1px 4px var(--shadow);
}
.bubble code {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  background: rgba(217,119,87,0.08);
  padding: 2px 6px; border-radius: 4px;
  font-size: 0.83em;
  color: var(--accent2);
  border: 1px solid rgba(217,119,87,0.15);
}
.bubble pre code { background: none; padding: 0; color: var(--text2); border: none; }
.bubble img.attached { max-width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid var(--border); box-shadow: 0 2px 8px var(--shadow); }

.msg-meta { display: flex; align-items: center; gap: 8px; }
.msg.user .msg-meta { justify-content: flex-end; }
.msg-time { font-size: 0.6rem; color: var(--muted); font-family: 'DM Sans', sans-serif; }

.bubble-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.18s; }
.msg:hover .bubble-actions { opacity: 1; }
.action-btn {
  padding: 3px 10px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 0.62rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: all 0.18s;
  box-shadow: 0 1px 2px var(--shadow);
}
.action-btn:hover { border-color: var(--accent3); color: var(--accent2); }

/* typing */
.typing { display: flex; align-items: center; gap: 12px; animation: slideUp 0.25s ease; }
.typing-avatar {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 0;
  box-shadow: 0 2px 8px rgba(217,119,87,0.25); flex-shrink: 0;
}
.typing-avatar::before { content: '✦'; color: #fff; font-size: 11px; }

.typing-dots {
  display: flex; gap: 5px;
  padding: 12px 16px;
  background: transparent;
  border: none;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.3s ease-in-out infinite;
  opacity: 0.5;
}
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.35; } 40% { transform: translateY(-5px); opacity: 0.8; } }

/* ── INPUT AREA ── */
.input-area {
  padding: 12px 24px 20px;
  border-top: 1px solid var(--border);
  background: rgba(245,244,239,0.95);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}

/* image preview strip */
#imagePreview { display: none; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
#imagePreview.show { display: flex; }
.img-preview-item { position: relative; }
.img-preview-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: block; box-shadow: 0 1px 4px var(--shadow); }
.img-preview-item .remove-img {
  position: absolute; top: -5px; right: -5px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--danger); border: 2px solid var(--bg);
  color: #fff; font-size: 9px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;
}

.input-row {
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 12px;
  transition: border-color 0.18s, box-shadow 0.18s;
  box-shadow: 0 2px 8px var(--shadow);
}
.input-row:focus-within {
  border-color: var(--border2);
  box-shadow: 0 2px 16px rgba(217,119,87,0.1), 0 0 0 3px rgba(217,119,87,0.06);
}

.input-tools { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
.input-icon-btn {
  width: 30px; height: 30px; border-radius: 7px;
  border: 1px solid transparent;
  background: transparent; color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all 0.18s;
}
.input-icon-btn:hover { border-color: var(--border); color: var(--text2); background: var(--surface2); }
.input-icon-btn.recording { color: var(--danger); animation: pulse-red 1s ease-in-out infinite; }
@keyframes pulse-red { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

#userInput {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem; font-weight: 400;
  line-height: 1.55; resize: none;
  max-height: 120px; overflow-y: auto;
  padding: 2px 0;
}
#userInput::placeholder { color: var(--muted); }
#userInput::-webkit-scrollbar { width: 3px; }
#userInput::-webkit-scrollbar-thumb { background: var(--border); }

.send-btn {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: var(--accent);
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.18s;
  box-shadow: 0 2px 8px rgba(217,119,87,0.3);
}
.send-btn:hover:not(:disabled) {
  background: var(--accent2);
  transform: scale(1.05);
  box-shadow: 0 4px 14px rgba(217,119,87,0.4);
}
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.input-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px; padding: 0 4px;
}
.input-hint { font-size: 0.62rem; color: var(--muted); font-family: 'DM Sans', sans-serif; }
.footer-actions { display: flex; gap: 12px; align-items: center; }
.clear-btn {
  font-size: 0.62rem; color: var(--muted);
  background: none; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: color 0.18s;
}
.clear-btn:hover { color: var(--danger); }

/* voice status bar */
#voiceStatus {
  display: none; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: rgba(212,67,58,0.06);
  border: 1px solid rgba(212,67,58,0.2);
  border-radius: 8px; margin-bottom: 8px;
  font-size: 0.66rem; color: #c0504a;
  font-family: 'DM Sans', sans-serif;
}
#voiceStatus.show { display: flex; }
.voice-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); animation: pulse-red 0.8s ease-in-out infinite; }

/* toast */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text); color: var(--surface);
  padding: 8px 18px; border-radius: 20px;
  font-size: 0.72rem; font-family: 'DM Sans', sans-serif;
  opacity: 0; transition: all 0.25s;
  pointer-events: none; z-index: 999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#fileInput { display: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 600px) {
  header { padding: 10px 16px; }
  .logo-text { font-size: 1rem; }
  .mode-btn { padding: 4px 8px; font-size: 0.62rem; }
  .messages { padding: 16px; gap: 14px; }
  .msg-content { max-width: 88%; }
  .bubble { font-size: 0.84rem; padding: 10px 13px; }
  .input-area { padding: 10px 16px 14px; }
  .welcome h1 { font-size: 1.55rem; }
  .welcome-icon { width: 54px; height: 54px; }
}

</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div>
        <div class="logo-text">Quophy AI</div>
        <div class="logo-sub">Personal AI Assistant</div>
      </div>
    </div>
    <div class="header-right">
      <div class="modes">
        <button class="mode-btn active" data-mode="default">Default</button>
        <button class="mode-btn" data-mode="coder">Coder</button>
        <button class="mode-btn" data-mode="tutor">Tutor</button>
        <button class="mode-btn" data-mode="friend">Friend</button>
      </div>
      <button class="icon-btn" id="ttsToggle" title="Toggle voice output" onclick="toggleTTS()">
        🔊<span class="tooltip">Voice output</span>
      </button>
    </div>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h1>Hey, I'm Quophy AI</h1>
      <p>Ask me anything — code, questions, or just chat. You can also send images or use your voice.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion('Help me write a Node.js API')">Help me write a Node.js API</button>
        <button class="suggestion" onclick="sendSuggestion('Explain async/await simply')">Explain async/await simply</button>
        <button class="suggestion" onclick="sendSuggestion('What can you do?')">What can you do?</button>
        <button class="suggestion" onclick="sendSuggestion('Debug my code')">Debug my code</button>
      </div>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div id="voiceStatus"><div class="voice-dot"></div><span>Listening… speak now</span></div>
    <div id="imagePreview"></div>
    <div class="input-row">
      <div class="input-tools">
        <button class="input-icon-btn" id="micBtn" onclick="toggleVoiceInput()" title="Voice input">🎤</button>
        <button class="input-icon-btn" onclick="document.getElementById('fileInput').click()" title="Attach image">🖼️</button>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleImageUpload(event)" />
      </div>
      <textarea id="userInput" placeholder="Message Quophy AI..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send · Shift+Enter for new line</span>
      <div class="footer-actions">
        <button class="clear-btn" onclick="clearChat()">Clear chat</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ──
let history      = [];
let currentMode  = "default";
let isLoading    = false;
let ttsEnabled   = false;
let isRecording  = false;
let recognition  = null;
let pendingImages = []; // [{base64, mimeType, dataUrl}]

const STORAGE_KEY = "quophyai_chat";

const messagesEl   = document.getElementById("messages");
const inputEl      = document.getElementById("userInput");
const sendBtn      = document.getElementById("sendBtn");
const micBtn       = document.getElementById("micBtn");
const ttsToggle    = document.getElementById("ttsToggle");
const voiceStatus  = document.getElementById("voiceStatus");
const imagePreview = document.getElementById("imagePreview");

// ── INIT ──
loadFromStorage();

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + "px";
});
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
    saveToStorage();
  });
});

// ── LOCALSTORAGE ──
function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ history, mode: currentMode }));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.mode) {
      currentMode = data.mode;
      document.querySelectorAll(".mode-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.mode === currentMode);
      });
    }
    if (data.history && data.history.length > 0) {
      history = data.history;
      // remove welcome
      const w = document.getElementById("welcome");
      if (w) w.remove();
      // render messages
      history.forEach(m => renderMessage(m.role === "user" ? "user" : "bot", m.content, m.imageDataUrl || null, false));
    }
  } catch(e) {}
}

// ── HELPERS ──
function ts() { return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }

function escapeHtml(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderMarkdown(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function toast(msg, duration = 2000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), duration);
}

function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

// ── RENDER MESSAGE ──
function renderMessage(role, content, imageDataUrl = null, animate = true) {
  const w = document.getElementById("welcome");
  if (w) w.remove();

  const isUser = role === "user";
  const div = document.createElement("div");
  div.className = `msg ${isUser ? "user" : "bot"}`;
  if (!animate) div.style.animation = "none";

  const bodyHtml = isUser
    ? `${imageDataUrl ? `<img class="attached" src="${imageDataUrl}" alt="attached image"/>` : ""}${content ? `<div style="margin-top:${imageDataUrl?'6px':'0'}">${escapeHtml(content).replace(/\n/g,'<br>')}</div>` : ""}`
    : renderMarkdown(content);

  const actionsHtml = !isUser
    ? `<div class="bubble-actions">
        <button class="action-btn" onclick="copyText(this,${JSON.stringify(content)})">copy</button>
        <button class="action-btn" onclick="speakText(${JSON.stringify(content)})">speak</button>
       </div>`
    : "";

  div.innerHTML = `
    <div class="msg-avatar">${isUser ? "👤" : "🤖"}</div>
    <div class="msg-content">
      <div class="bubble">${bodyHtml}</div>
      <div class="msg-meta">
        <span class="msg-time">${ts()}</span>
        ${actionsHtml}
      </div>
    </div>`;

  messagesEl.appendChild(div);
  scrollBottom();
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "typing"; div.id = "typing";
  div.innerHTML = `<div class="typing-avatar">🤖</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}
function removeTyping() { const t = document.getElementById("typing"); if(t) t.remove(); }

// ── SEND MESSAGE ──
async function sendMessage() {
  const text = inputEl.value.trim();
  const hasImages = pendingImages.length > 0;
  if ((!text && !hasImages) || isLoading) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  isLoading = true;
  sendBtn.disabled = true;

  const imgs = [...pendingImages];
  clearImagePreviews();

  // render user message
  const firstImg = imgs[0] || null;
  renderMessage("user", text, firstImg ? firstImg.dataUrl : null);

  addTyping();

  try {
    let reply;

    if (hasImages) {
      // vision call — send first image + prompt
      const img = imgs[0];
      const promptText = text || "Describe this image in detail.";
      const res = await fetch("/api/vision", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imageBase64: img.base64, mimeType: img.mimeType, prompt: promptText, personality: currentMode })
      });
      const data = await res.json();
      reply = data.error ? "⚠️ " + data.error : data.reply;

      // add to text history so context continues
      history.push({ role: "user", content: promptText });
      history.push({ role: "assistant", content: reply });

    } else {
      // text chat
      history.push({ role: "user", content: text });
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, personality: currentMode })
      });
      const data = await res.json();
      reply = data.error ? "⚠️ " + data.error : data.reply;
      if (!data.error) history.push({ role: "assistant", content: reply });
    }

    removeTyping();
    renderMessage("bot", reply);
    saveToStorage();

    if (ttsEnabled) speakText(reply);

  } catch(err) {
    removeTyping();
    renderMessage("bot", "⚠️ Connection error. Please try again.");
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function sendSuggestion(text) { inputEl.value = text; sendMessage(); }

// ── CLEAR ──
function clearChat() {
  history = [];
  saveToStorage();
  messagesEl.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h1>Hey, I'm Quophy AI</h1>
      <p>Ask me anything — code, questions, or just chat. You can also send images or use your voice.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion('Help me write a Node.js API')">Help me write a Node.js API</button>
        <button class="suggestion" onclick="sendSuggestion('Explain async/await simply')">Explain async/await simply</button>
        <button class="suggestion" onclick="sendSuggestion('What can you do?')">What can you do?</button>
        <button class="suggestion" onclick="sendSuggestion('Debug my code')">Debug my code</button>
      </div>
    </div>`;
}

// ── COPY ──
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = "copied!";
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ── TTS (voice output) ──
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsToggle.classList.toggle("on", ttsEnabled);
  toast(ttsEnabled ? "🔊 Voice output ON" : "🔇 Voice output OFF");
}

function speakText(text) {
  if (!("speechSynthesis" in window)) { toast("TTS not supported in this browser"); return; }
  window.speechSynthesis.cancel();
  const stripped = text.replace(/```[\s\S]*?```/g,"[code block]").replace(/`[^`]+`/g,"").replace(/\*\*/g,"").replace(/\*/g,"");
  const utt = new SpeechSynthesisUtterance(stripped);
  utt.rate = 1.05; utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

// ── VOICE INPUT (STT) ──
function toggleVoiceInput() {
  if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
    toast("Voice input not supported in this browser");
    return;
  }
  if (isRecording) {
    stopVoiceInput();
  } else {
    startVoiceInput();
  }
}

function startVoiceInput() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.textContent = "⏹️";
    voiceStatus.classList.add("show");
  };

  recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join("");
    inputEl.value = transcript;
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + "px";
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
    voiceStatus.classList.remove("show");
    recognition = null;
    // auto-send if there's text
    if (inputEl.value.trim()) sendMessage();
  };

  recognition.onerror = e => {
    toast("Voice error: " + e.error);
    stopVoiceInput();
  };

  recognition.start();
}

function stopVoiceInput() {
  if (recognition) { recognition.stop(); recognition = null; }
  isRecording = false;
  micBtn.classList.remove("recording");
  micBtn.textContent = "🎤";
  voiceStatus.classList.remove("show");
}

// ── IMAGE UPLOAD ──
function handleImageUpload(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    if (!file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      const base64 = dataUrl.split(",")[1];
      const mimeType = file.type;
      pendingImages.push({ base64, mimeType, dataUrl });
      addImagePreview(dataUrl, pendingImages.length - 1);
    };
    reader.readAsDataURL(file);
  });
  e.target.value = "";
}

function addImagePreview(dataUrl, idx) {
  imagePreview.classList.add("show");
  const item = document.createElement("div");
  item.className = "img-preview-item";
  item.dataset.idx = idx;
  item.innerHTML = `<img src="${dataUrl}" alt="preview"/><button class="remove-img" onclick="removeImage(${idx})">✕</button>`;
  imagePreview.appendChild(item);
}

function removeImage(idx) {
  pendingImages.splice(idx, 1);
  refreshImagePreviews();
}

function refreshImagePreviews() {
  imagePreview.innerHTML = "";
  if (pendingImages.length === 0) { imagePreview.classList.remove("show"); return; }
  pendingImages.forEach((img, i) => addImagePreview(img.dataUrl, i));
}

function clearImagePreviews() {
  pendingImages = [];
  imagePreview.innerHTML = "";
  imagePreview.classList.remove("show");
}

// Paste image from clipboard
document.addEventListener("paste", e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith("image/")) {
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        const base64 = dataUrl.split(",")[1];
        pendingImages.push({ base64, mimeType: item.type, dataUrl });
        addImagePreview(dataUrl, pendingImages.length - 1);
        toast("📎 Image pasted!");
      };
      reader.readAsDataURL(file);
    }
  }
});

inputEl.focus();
</script>
